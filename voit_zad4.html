<h1> Sposoby podłączania CSS do kodu strony WWW </h1>

<h2>1) <u>Zewnętrzny</u> arkusz stylów.</h2>

<textarea NAME=1 ROWS=3 COLS=67> <head> 
	<link rel="Stylesheet" type="text/css" href="style.css" /> 
</head></textarea> 

<h2>2) Styl<u> lokalny</u> inaczej: (styl wpisany, liniowy, linijkowy, w linii)  czyli <br>
dopisanie arkusza do wybranego bloku treści strony.  </h2>

<textarea NAME=2 ROWS=1 COLS=70><selektor style="cecha1: wartość1; cecha2: wartość2...">...</selektor></textarea> 

<h2>3) <u>Wewnętrzny</u> arkusz stylów.  </h2>

<textarea NAME=3 ROWS=6 COLS=70><head> 
   <style type="text/css"> 
      selektor1 { cecha: wartość; cecha2: wartość2... } 
      selektor2 { cecha: wartość; cecha2: wartość2... } 
   </style> 
</head></textarea> 

<h2>4) <u>Alternatywny</u> arkusz stylów.</h2>

<textarea NAME=3 ROWS=5 COLS=90><head> 
   <link rel="Stylesheet" type="text/css" href="style.css" title="Nazwa domyślna" /> 
   <link rel="Alternate stylesheet" type="text/css" href="style1.css" title="Nazwa 1" /> 
   <link rel="Alternate stylesheet" type="text/css" href="style2.css" title="Nazwa 2" /> 
</head></textarea>  

<h2>5) <u>Import arkusza</u> stylów.  </h2>

<textarea NAME=3 ROWS=3 COLS=70><style type="text/css"> 
			@import url(adres zewnętrznego arkusza stylów); 
</style> </textarea>
