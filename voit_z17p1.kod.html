    <p id="pogrubienie_voitiuk">Voitiuk: Informatyk zabrał swojego syna do zoo. Stoją przed wybiegiem dla pingwinów. - Popatrz synku, a to są żyjące na dalekim południu, na Antarktydzie, linuksy ...</p>
    <p id="pochylona_voitiuk">Voitiuk: Dobry informatyk wiesza się wraz ze swoim komputerem!</p>
    <p id="index_gorny_voitiuk">Voituk: Rozmowa żony z mężem. - Kochanie, zamknij proszę okno - mówi żona do męża - informatyka. - Sama sobie wciśnij Alt+F4!</p>
    <p id="index_dolny_voitiuk">Voitiuk: Ze słownika zgryźliwego informatyka. BETA- Oprogramowanie po seriach testów, pozwala przygotować się na ostateczny interfejs i działanie programu. Beta jest łacińskim określeniem dla ”nadal nie działa”.</p>
    <p id="mono_voitiuk">Voitiuk: Jakiego typu przekąski jedzą programiści? Chipsy z prawami dostępu.</p>
    <p id="powiekszenie_voitiuk">Voitiuk: Dlaczego informatycy tak ciężko oddychają? Bo zawsze mają złą paczkę.</p>
    <p id="pomniejszenie_voitiuk">Voitiuk: Czemu programista wybrał piłkę zamiast komputera? Bo na boisku nigdy nie ma błędów.</p>
